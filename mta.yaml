_schema-version: 3.3.0
ID: ztechwavedemo
description: A simple CAP project.
version: 1.0.0
modules:
- name: ztechwavedemo-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: ztechwavedemo-auth
  - name: ztechwavedemo-db
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: ztechwavedemo-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: ztechwavedemo-db
  parameters:
    buildpack: nodejs_buildpack
- name: ztechwavedemo-destination-content
  type: com.sap.application.content
  requires:
  - name: ztechwavedemo-destination-service
    parameters:
      content-target: true
  - name: ztechwavedemo_html_repo_host
    parameters:
      service-key:
        name: ztechwavedemo_html_repo_host-key
  - name: ztechwavedemo-auth
    parameters:
      service-key:
        name: ztechwavedemo-auth-key
  parameters:
    content:
      instance:
        destinations:
        - Name: approuter_ztechwavedemo_html_repo_host
          ServiceInstanceName: ztechwavedemo-html5-app-host-service
          ServiceKeyName: ztechwavedemo_html_repo_host-key
          sap.cloud.service: approuter
        - Authentication: OAuth2UserTokenExchange
          Name: approuter_ztechwavedemo_auth
          ServiceInstanceName: ztechwavedemo-auth
          ServiceKeyName: ztechwavedemo-auth-key
          sap.cloud.service: approuter
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: ztechwavedemo
  type: approuter.nodejs
  path: app/router
  requires:
  - name: srv-api
    group: destinations
    properties:
      forwardAuthToken: true
      name: srv-api
      url: ~{srv-url}
  - name: ztechwavedemo-auth
  - name: ztechwavedemo-destination-service
    group: destinations
    properties:
      forwardAuthToken: false
      name: ui5
      url: https://ui5.sap.com
  provides:
  - name: app-api
    properties:
      app-protocol: ${protocol}
      app-uri: ${default-uri}
  parameters:
    disk-quota: 256M
    keep-existing-routes: true
    memory: 256M
- name: ztechwavedemo-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: ztechwavedemo_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - demoproject.zip
      name: demoproject
      target-path: resources/
- name: demoproject
  type: html5
  path: app/demoproject
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: ztechwavedemo-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
        redirect-uris:
        - https://*~{app-api/app-uri}/**
      tenant-mode: dedicated
      xsappname: ztechwavedemo-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
  requires:
  - name: app-api
- name: ztechwavedemo-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: ztechwavedemo-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: ztechwavedemo-destination-service
    service-plan: lite
  requires:
  - name: srv-api
- name: ztechwavedemo_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: ztechwavedemo-html5-app-host-service
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
